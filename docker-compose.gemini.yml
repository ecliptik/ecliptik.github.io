services:
  gemini:
    build:
      context: .
      dockerfile: Dockerfile.gemini
    ports:
      - "1965:1965"
    volumes:
      # Mount gemini content
      - ./_gemini:/var/gemini:ro
      # Mount config
      - ./.docker/gemini/molly.conf:/gemini/molly.conf:ro
      # Persist certs and logs within repo
      - ./.docker/gemini/certs:/gemini/certs
      - ./.docker/gemini/logs:/gemini/logs
    restart: unless-stopped
