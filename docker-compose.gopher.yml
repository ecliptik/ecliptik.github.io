services:
  jekyll:
    build: .
    ports:
      - "4000:4000"
    volumes:
      - .:/app
    networks:
      - gopher-test

  gopher:
    image: prologic/gophernicus:latest
    ports:
      - "70:70"
    volumes:
      - ./_gopher:/var/gopher:ro
    environment:
      - GOPHER_ROOT=/var/gopher
      - GOPHER_HOSTNAME=localhost
    networks:
      - gopher-test
    restart: unless-stopped
    depends_on:
      - jekyll

networks:
  gopher-test:
    driver: bridge
