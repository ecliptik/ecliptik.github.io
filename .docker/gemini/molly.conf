# Molly Brown Gemini Server Configuration
# Port to listen on
Port = 1965

# Hostname
Hostname = "localhost"

# TLS certificate paths (inside container)
CertPath = "/gemini/certs/cert.pem"
KeyPath = "/gemini/certs/key.pem"

# Document root
DocBase = "/var/gemini"

# Logging (to stderr in container)
AccessLog = ""
ErrorLog = ""

# Enable directory listings
DirectoryListing = true

# Gemini file extension
GeminiExt = "gmi"
