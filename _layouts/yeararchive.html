---
layout: default
---

<h2>Blog posts from {{ page.year }}</h2>

<table>
{% for post in site.posts %}
  {% assign post_year = post.date | date: "%Y" %}
  {% if post_year == page.year %}
  <tr>
    <td>{{ post.date | date: "%b %d %Y" }}</td><td><a href="{{ post.url }}">{{ post.title }}</a></td>
  </tr>
  {% endif %}
{% endfor %}
</table>
