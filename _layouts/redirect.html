<!DOCTYPE html>
<html lang="en-US">
  <!-- Custom redirect template with relative URLs -->
  <meta charset="utf-8">
  {% assign redirect_path = page.redirect.to | remove: site.url | remove: "http://0.0.0.0:4000" | remove: "https://0.0.0.0:4000" %}
  <title>Redirecting&hellip;</title>
  <link rel="canonical" href="{{ redirect_path }}">
  <script>location="{{ redirect_path }}"</script>
  <meta http-equiv="refresh" content="0; url={{ redirect_path }}">
  <meta name="robots" content="noindex">
  <h1>Redirecting&hellip;</h1>
  <a href="{{ redirect_path }}">Click here if you are not redirected.</a>
</html>
